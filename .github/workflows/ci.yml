name: CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  lint:
    name: Lint (oxlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run oxlint
        run: pnpm run lint

  format:
    name: Format Check (oxfmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run oxfmt
        run: pnpm run format:check

  typecheck:
    name: Type Check (oxlint --type-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run oxlint type-check
        run: pnpm run typecheck

  build:
    name: Build (tsdown)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Test CLI help
        run: node dist/index.mjs --help

      - name: Test CLI dry run
        run: |
          mkdir -p /tmp/test-project
          node dist/index.mjs /tmp/test-project --yes
          ls -la /tmp/test-project
          cat /tmp/test-project/.ziku/ziku.jsonc
          cat /tmp/test-project/.ziku/lock.json

  test:
    name: Test (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test:run

  docs:
    name: Check README
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check README is up to date
        run: pnpm run docs:check

  release-dry-run:
    name: Release Dry Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # setup-node が registry-url 設定時に .npmrc へ before=null を書き込む。
      # npm 11.x (Node 24) はこれを不正な日付値として拒否するため除去する。
      # 環境変数・ユーザー設定・プロジェクトローカルの全箇所から除去する。
      - name: Fix .npmrc before=null
        run: |
          for f in "$NPM_CONFIG_USERCONFIG" .npmrc "$HOME/.npmrc"; do
            [ -f "$f" ] && sed -i '/^before=/d' "$f" || true
          done
          unset npm_config_before
          echo "npm_config_before=" >> "$GITHUB_ENV"

      - name: Dry-run version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! ls .changeset/*.md 2>/dev/null | grep -qv README.md; then
            echo "No changesets found, skipping release dry-run"
            exit 0
          fi
          pnpm run version

      - name: Dry-run publish
        run: |
          # version ステップが .npmrc を再生成する場合に備えて再除去
          for f in "$NPM_CONFIG_USERCONFIG" .npmrc "$HOME/.npmrc"; do
            [ -f "$f" ] && sed -i '/^before=/d' "$f" || true
          done
          pnpm run build
          npm publish --dry-run
