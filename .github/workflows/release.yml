name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      # npm 11.x が OIDC trusted publishing に必要。
      # Node.js 22 バンドルの npm 10.x では OIDC トークン交換による publish が失敗する。
      # Node.js 22.22.2 では npm self-upgrade 時に promise-retry MODULE_NOT_FOUND が
      # 発生する (npm/cli#9151)。npm 10.9.8 で修正予定だが、それまでは段階的に
      # アップグレードすることで回避する。
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@10.9.8 && npm install -g npm@latest

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
      pullRequestNumber: ${{ steps.changesets.outputs.pullRequestNumber }}

  ci-on-release-pr:
    name: CI on Release PR
    needs: release
    if: needs.release.outputs.hasChangesets == 'true' && needs.release.outputs.pullRequestNumber != ''
    uses: ./.github/workflows/ci.yml
