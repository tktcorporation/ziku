name: Changeset Check

on:
  pull_request:
    branches: [main]

jobs:
  changeset-check:
    name: Check for changeset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changeset files
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          CHANGED_FILES=$(git diff --name-only "origin/${BASE_REF}...HEAD")

          CODE_CHANGES=$(echo "$CHANGED_FILES" | grep -E '^src/' || true)
          if [ -z "$CODE_CHANGES" ]; then
            echo "No code changes detected, skipping changeset check"
            exit 0
          fi

          echo "Detected code changes:"
          echo "$CODE_CHANGES"
          echo ""

          CHANGESET_FILES=$(echo "$CHANGED_FILES" | grep -E '^\.changeset/.+\.md$' | grep -v 'README.md' || true)
          if [ -z "$CHANGESET_FILES" ]; then
            echo "::error::No changeset found. Please run 'pnpm changeset' to create one."
            echo ""
            echo "If this change doesn't need a release, add an empty changeset with 'pnpm changeset --empty'."
            exit 1
          fi

          echo "Changeset found:"
          echo "$CHANGESET_FILES"

      - name: Validate changeset package names
        run: bash scripts/validate-changesets.sh
